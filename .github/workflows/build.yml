name: Build

on:
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Linux
  # ===========================================================================
  build-linux:
    runs-on: ubuntu-22.04
    env:
      APT_CACHE_DIR: ${{ github.workspace }}/.apt-cache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_NOHASHDIR: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: ${{ env.APT_CACHE_DIR }}
          key: apt-linux-ubuntu-22.04-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            apt-linux-ubuntu-22.04-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-${{ github.job }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', '.github/workflows/build.yml') }}-${{ github.sha }}
          restore-keys: |
            ccache-linux-${{ github.job }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', '.github/workflows/build.yml') }}-
            ccache-linux-${{ github.job }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          mkdir -p "${APT_CACHE_DIR}"
          sudo apt-get -o dir::cache::archives="${APT_CACHE_DIR}" install -y \
            libsword-dev libsqlite3-dev \
            libx11-dev libxft-dev libxrender-dev libfontconfig1-dev \
            libxinerama-dev libxcursor-dev libxfixes-dev \
            libpng-dev libjpeg-dev zlib1g-dev \
            ccache cmake g++ pkg-config

      - name: Initialize ccache
        run: |
          ccache --set-config=max_size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Package (tar.gz)
        run: cmake --build build --target bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verdad-linux-x86_64
          path: build/verdad-*.tar.gz

  # ===========================================================================
  # macOS (ARM64)
  # ===========================================================================
  build-macos-arm64:
    runs-on: macos-14
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_NOHASHDIR: "true"
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-macos-arm64-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            homebrew-macos-arm64-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ github.job }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', '.github/workflows/build.yml') }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-${{ github.job }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', '.github/workflows/build.yml') }}-
            ccache-macos-${{ github.job }}-

      - name: Install system dependencies
        run: brew install pkg-config ccache

      - name: Initialize ccache
        run: |
          ccache --set-config=max_size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Get SWORD mirror commit SHA
        id: sword-sha
        run: echo "sha=$(git ls-remote https://github.com/bibletime/crosswire-sword-mirror HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Cache SWORD install
        id: cache-sword
        uses: actions/cache@v4
        with:
          path: deps/sword
          key: sword-macos-arm64-${{ steps.sword-sha.outputs.sha }}

      - name: Clone SWORD mirror
        if: steps.cache-sword.outputs.cache-hit != 'true'
        run: git clone --depth=1 https://github.com/bibletime/crosswire-sword-mirror sword-src

      - name: Patch SWORD CMakeLists.txt
        if: steps.cache-sword.outputs.cache-hit != 'true'
        run: sed -i '' '/include(FindSubversion)/d; /Subversion_WC_INFO/d' sword-src/CMakeLists.txt

      - name: Build SWORD from source
        if: steps.cache-sword.outputs.cache-hit != 'true'
        run: |
          cmake -S sword-src -B sword-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_STANDARD=11 \
            -DLIBSWORD_LIBRARY_TYPE=Static \
            -DSWORD_BUILD_UTILS=No \
            -DSWORD_BUILD_EXAMPLES=No \
            -DSWORD_BUILD_TESTS=OFF \
            -DSWORD_NO_CLUCENE=Yes \
            -DSWORD_NO_XZ=Yes \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/deps/sword" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          cmake --build sword-build -j$(sysctl -n hw.logicalcpu)
          cmake --install sword-build

      - name: Configure Verdad
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/deps/sword" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build Verdad
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Package (.app bundle)
        run: cmake --build build --target app

      - name: Copy SWORD data into bundle
        run: |
          SWORD_SHARE="${{ github.workspace }}/deps/sword/share/sword"
          RESOURCES="build/Verdad.app/Contents/Resources/sword"
          if [ -d "$SWORD_SHARE" ]; then
            mkdir -p "$RESOURCES"
            cp -R "$SWORD_SHARE/locales.d" "$RESOURCES/"
            if [ -d "$SWORD_SHARE/mods.d" ]; then
              cp -R "$SWORD_SHARE/mods.d" "$RESOURCES/"
            fi
          fi

      - name: Create DMG
        run: cmake --build build --target dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verdad-macos-arm64
          path: build/verdad-*.dmg

  # ===========================================================================
  # macOS (Intel x86_64)
  # ===========================================================================
  build-macos-intel:
    runs-on: macos-15-intel
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_NOHASHDIR: "true"
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-macos-x86_64-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            homebrew-macos-x86_64-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ github.job }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', '.github/workflows/build.yml') }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-${{ github.job }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', '.github/workflows/build.yml') }}-
            ccache-macos-${{ github.job }}-

      - name: Install system dependencies
        run: brew install pkg-config ccache

      - name: Initialize ccache
        run: |
          ccache --set-config=max_size="${CCACHE_MAXSIZE}"
          ccache --zero-stats

      - name: Get SWORD mirror commit SHA
        id: sword-sha
        run: echo "sha=$(git ls-remote https://github.com/bibletime/crosswire-sword-mirror HEAD | cut -f1)" >> $GITHUB_OUTPUT

      - name: Cache SWORD install
        id: cache-sword
        uses: actions/cache@v4
        with:
          path: deps/sword
          key: sword-macos-x86_64-${{ steps.sword-sha.outputs.sha }}

      - name: Clone SWORD mirror
        if: steps.cache-sword.outputs.cache-hit != 'true'
        run: git clone --depth=1 https://github.com/bibletime/crosswire-sword-mirror sword-src

      - name: Patch SWORD CMakeLists.txt
        if: steps.cache-sword.outputs.cache-hit != 'true'
        run: sed -i '' '/include(FindSubversion)/d; /Subversion_WC_INFO/d' sword-src/CMakeLists.txt

      - name: Build SWORD from source
        if: steps.cache-sword.outputs.cache-hit != 'true'
        run: |
          cmake -S sword-src -B sword-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_STANDARD=11 \
            -DLIBSWORD_LIBRARY_TYPE=Static \
            -DSWORD_BUILD_UTILS=No \
            -DSWORD_BUILD_EXAMPLES=No \
            -DSWORD_BUILD_TESTS=OFF \
            -DSWORD_NO_CLUCENE=Yes \
            -DSWORD_NO_XZ=Yes \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/deps/sword" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15
          cmake --build sword-build -j$(sysctl -n hw.logicalcpu)
          cmake --install sword-build

      - name: Configure Verdad
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/deps/sword" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15

      - name: Build Verdad
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Package (.app bundle)
        run: cmake --build build --target app

      - name: Copy SWORD data into bundle
        run: |
          SWORD_SHARE="${{ github.workspace }}/deps/sword/share/sword"
          RESOURCES="build/Verdad.app/Contents/Resources/sword"
          if [ -d "$SWORD_SHARE" ]; then
            mkdir -p "$RESOURCES"
            cp -R "$SWORD_SHARE/locales.d" "$RESOURCES/"
            if [ -d "$SWORD_SHARE/mods.d" ]; then
              cp -R "$SWORD_SHARE/mods.d" "$RESOURCES/"
            fi
          fi

      - name: Create DMG
        run: cmake --build build --target dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verdad-macos-x86_64
          path: build/verdad-*.dmg

  # ===========================================================================
  # Windows (x64, MSVC)
  # ===========================================================================
  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg\installed\x64-windows-static
            C:\vcpkg\packages
          key: vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ hashFiles('.github/workflows/build.yml', 'CMakeLists.txt') }}
          restore-keys: |
            vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-

      - name: Install vcpkg dependencies
        run: |
          vcpkg install sqlite3:x64-windows-static curl:x64-windows-static zlib:x64-windows-static bzip2:x64-windows-static

      - name: Get SWORD mirror commit SHA
        id: sword-sha
        shell: pwsh
        run: |
          $sha = (git ls-remote https://github.com/bibletime/crosswire-sword-mirror HEAD) -split '\s+' | Select-Object -First 1
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Cache SWORD install
        id: cache-sword
        uses: actions/cache@v4
        with:
          path: deps/sword
          key: sword-windows-x64-static-v3-${{ steps.sword-sha.outputs.sha }}

      - name: Clone SWORD mirror
        if: steps.cache-sword.outputs.cache-hit != 'true'
        run: git clone --depth=1 https://github.com/bibletime/crosswire-sword-mirror sword-src

      - name: Patch SWORD CMakeLists.txt
        if: steps.cache-sword.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $f = 'sword-src/CMakeLists.txt'
          (Get-Content $f) | Where-Object { $_ -notmatch 'FindSubversion|Subversion_WC_INFO' } | Set-Content $f

      - name: Build SWORD from source
        if: steps.cache-sword.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          cmake -S sword-src -B sword-build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ^
            -DCMAKE_CXX_STANDARD=11 ^
            -DLIBSWORD_LIBRARY_TYPE=Static ^
            -DSWORD_BUILD_UTILS=No ^
            -DSWORD_BUILD_EXAMPLES=No ^
            -DSWORD_BUILD_TESTS=OFF ^
            -DSWORD_NO_CLUCENE=Yes ^
            -DSWORD_NO_XZ=Yes ^
            -DZLIB_ROOT=C:/vcpkg/installed/x64-windows-static ^
            -DCURL_ROOT=C:/vcpkg/installed/x64-windows-static ^
            -DBZip2_ROOT=C:/vcpkg/installed/x64-windows-static ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DCMAKE_INSTALL_PREFIX=%GITHUB_WORKSPACE%\deps\sword
          cmake --build sword-build --config Release
          cmake --install sword-build --config Release

      - name: Configure Verdad
        shell: cmd
        run: |
          cmake -S . -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DCMAKE_PREFIX_PATH=%GITHUB_WORKSPACE%\deps\sword

      - name: Build Verdad
        run: cmake --build build --config Release

      - name: Install WiX Toolset
        run: choco install wixtoolset --yes

      - name: Package (zip)
        shell: pwsh
        run: |
          # Copy SWORD data into the bundle directory before zipping
          $swordShare = "${{ github.workspace }}\deps\sword\share\sword"
          $bundleDir = (Get-ChildItem -Directory build\verdad-*-Windows-* | Select-Object -First 1)
          if (!$bundleDir) {
            # winzip hasn't created the dir yet; build it first to establish layout
            cmake --build build --config Release --target winzip
            $bundleDir = (Get-ChildItem -Directory build\verdad-*-Windows-* | Select-Object -First 1)
          }
          if (!$bundleDir) {
            throw "Windows bundle directory was not created."
          }
          if ($bundleDir -and (Test-Path $swordShare)) {
            $dest = Join-Path $bundleDir.FullName "sword"
            Copy-Item -Recurse $swordShare $dest
          }
          # Re-create the zip with SWORD data included
          $bundleName = $bundleDir.Name
          Push-Location build
          $zipFile = "${bundleName}.zip"
          Remove-Item -Force $zipFile -ErrorAction SilentlyContinue
          cmake -E tar cf "$zipFile" --format=zip "$bundleName"
          Pop-Location

      - name: Package (MSI)
        run: cmake --build build --config Release --target msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verdad-windows-x64
          path: |
            build/verdad-*.zip
            build/verdad-*.msi
