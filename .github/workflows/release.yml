name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish, for example v0.5.0
        required: true
        type: string
      title:
        description: Release title; defaults to the tag when left blank
        required: false
        default: ""
        type: string
      notes:
        description: Optional release notes; autogenerated when left blank
        required: false
        default: ""
        type: string
      draft:
        description: Create the release as a draft
        required: false
        default: true
        type: boolean
      prerelease:
        description: Mark the release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on: ubuntu-22.04
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_DRAFT: ${{ inputs.draft }}
      RELEASE_NOTES: ${{ inputs.notes }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease }}
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_TITLE: ${{ inputs.title }}
    steps:
      - name: Find latest Build workflow run
        id: find-run
        shell: bash
        run: |
          set -euo pipefail
          
          # Get the latest successful Build workflow run.
          # Older gh versions do not support: --conclusion success
          run_id=$(gh run list \
            --repo "$GH_REPO" \
            --workflow build.yml \
            --status completed \
            --limit 20 \
            --json databaseId,conclusion \
            --jq 'map(select(.conclusion == "success")) | .[0].databaseId // empty')
          
          if [ -z "$run_id" ]; then
            echo "No successful Build workflow run found." >&2
            exit 1
          fi
          
          echo "Found build run ID: $run_id"
          echo "build_run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh run download "${{ steps.find-run.outputs.build_run_id }}" \
            --repo "$GH_REPO" \
            --dir release-assets

      - name: Show downloaded files
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f | sort

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(
            find release-assets -type f \
              \( -name '*.tar.gz' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.zip' -o -name '*.msi' \) \
              | sort
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release package files were downloaded from build run ${{ steps.find-run.outputs.build_run_id }}." >&2
            exit 1
          fi

          title="${RELEASE_TITLE:-$RELEASE_TAG}"

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            edit_args=(--repo "$GH_REPO")
            if [ -n "$RELEASE_TITLE" ]; then
              edit_args+=(--title "$title")
            fi
            if [ -n "$RELEASE_NOTES" ]; then
              edit_args+=(--notes "$RELEASE_NOTES")
            fi
            if [ "$RELEASE_DRAFT" = "true" ]; then
              edit_args+=(--draft)
            fi
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              edit_args+=(--prerelease)
            fi
            if [ "${#edit_args[@]}" -gt 2 ]; then
              gh release edit "$RELEASE_TAG" "${edit_args[@]}"
            fi

            gh release upload "$RELEASE_TAG" "${files[@]}" \
              --repo "$GH_REPO" \
              --clobber
          else
            create_args=(
              --repo "$GH_REPO"
              --title "$title"
              # --verify-tag
            )
            if [ "$RELEASE_DRAFT" = "true" ]; then
              create_args+=(--draft)
            fi
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              create_args+=(--prerelease)
            fi
            if [ -n "$RELEASE_NOTES" ]; then
              create_args+=(--notes "$RELEASE_NOTES")
            else
              create_args+=(--generate-notes)
            fi

            gh release create "$RELEASE_TAG" "${files[@]}" "${create_args[@]}"
          fi

      - name: Summarize release
        shell: bash
        run: |
          set -euo pipefail
          release_url="$(gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json url --jq .url)"
          {
            echo "Release: $release_url"
            echo
            echo "Assets uploaded from build run: ${{ steps.find-run.outputs.build_run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
